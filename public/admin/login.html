<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Carzaar</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">


</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
      <h1>Admin Login</h1>

      <form id="loginForm" novalidate>
        <div class="form-group" data-field="email">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@example.com" required autocomplete="email" autofocus>
          <span class="error"></span>
        </div>

        <div class="form-group" data-field="password">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          <span class="error"></span>
        </div>

        <div class="form-group" data-field="general">
          <div class="alert alert-error" id="loginError" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span class="alert-message"></span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Sign in</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { login, initAuthGuard } from '../js/admin-auth.js';

    initAuthGuard();

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    function clearErrors() {
      document.querySelectorAll('.form-group.invalid').forEach(el => el.classList.remove('invalid'));
      loginError.style.display = 'none';
      loginError.querySelector('.alert-message').textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        emailInput.closest('.form-group').classList.add('invalid');
        emailInput.closest('.form-group').querySelector('.error').textContent = 'Email is required';
        return;
      }

      if (!password) {
        passwordInput.closest('.form-group').classList.add('invalid');
        passwordInput.closest('.form-group').querySelector('.error').textContent = 'Password is required';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        await login(email, password);
      } catch (err) {
        loginError.querySelector('.alert-message').textContent = err.message;
        loginError.style.display = 'flex';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>

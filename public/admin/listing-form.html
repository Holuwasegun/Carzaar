<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Listing — Carzaar Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/admin.css">


</head>
<body>
  <header class="admin-header">
    <div class="container">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html"><span>Dashboard</span></a>
        <button class="btn btn-sm btn-ghost" id="logoutBtn" style="color:rgba(255,255,255,0.85)">Logout</button>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <h1 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-6)" id="formTitle">Add New Listing</h1>

      <form id="listingForm" novalidate>
        <div class="admin-form-grid">
          <div class="form-group full-width" data-field="description">
            <label for="description">Description</label>
            <textarea id="description" class="form-input" placeholder="Detailed description of the vehicle..." required></textarea>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="make">
            <label for="make">Make *</label>
            <input type="text" id="make" class="form-input" placeholder="e.g. Toyota" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="model">
            <label for="model">Model *</label>
            <input type="text" id="model" class="form-input" placeholder="e.g. Camry" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="year">
            <label for="year">Year *</label>
            <input type="number" id="year" class="form-input" placeholder="e.g. 2015" min="1980" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="price">
            <label for="price">Price (NGN) *</label>
            <input type="number" id="price" class="form-input" placeholder="e.g. 4500000" min="1" required>
            <span class="hint">Whole Naira, no kobo</span>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="condition">
            <label for="condition">Condition *</label>
            <select id="condition" class="form-input" required>
              <option value="">Select condition</option>
              <option value="Brand New">Brand New</option>
              <option value="Nigerian Used">Nigerian Used</option>
              <option value="Foreign Used (Tokunbo)">Foreign Used (Tokunbo)</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="location">
            <label for="location">Location *</label>
            <input type="text" id="location" class="form-input" placeholder="e.g. Lagos, Nigeria" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="mileage">
            <label for="mileage">Mileage (km) *</label>
            <input type="number" id="mileage" class="form-input" placeholder="e.g. 45000" min="0" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="bodyType">
            <label for="bodyType">Body Type *</label>
            <select id="bodyType" class="form-input" required>
              <option value="">Select body type</option>
              <option value="sedan">Sedan</option>
              <option value="suv">SUV</option>
              <option value="hatchback">Hatchback</option>
              <option value="coupe">Coupe</option>
              <option value="pickup">Pickup</option>
              <option value="van">Van</option>
              <option value="wagon">Wagon</option>
              <option value="convertible">Convertible</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="color">
            <label for="color">Color *</label>
            <input type="text" id="color" class="form-input" placeholder="e.g. Black" required>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="transmission">
            <label for="transmission">Transmission *</label>
            <select id="transmission" class="form-input" required>
              <option value="">Select transmission</option>
              <option value="automatic">Automatic</option>
              <option value="manual">Manual</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="fuel">
            <label for="fuel">Fuel Type *</label>
            <select id="fuel" class="form-input" required>
              <option value="">Select fuel type</option>
              <option value="petrol">Petrol</option>
              <option value="diesel">Diesel</option>
              <option value="hybrid">Hybrid</option>
              <option value="electric">Electric</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="drivetrain">
            <label for="drivetrain">Drivetrain *</label>
            <select id="drivetrain" class="form-input" required>
              <option value="">Select drivetrain</option>
              <option value="fwd">FWD</option>
              <option value="rwd">RWD</option>
              <option value="awd">AWD</option>
              <option value="4wd">4WD</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="engineCapacity">
            <label for="engineCapacity">Engine Capacity (L)</label>
            <input type="number" id="engineCapacity" class="form-input" placeholder="e.g. 1.6" step="0.1" min="0.5" max="8">
            <span class="hint">Optional, e.g. 1.6, 2.0, 3.5</span>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="numberOfDoors">
            <label for="numberOfDoors">Number of Doors</label>
            <input type="number" id="numberOfDoors" class="form-input" placeholder="2–6" min="2" max="6">
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="numberOfSeats">
            <label for="numberOfSeats">Number of Seats</label>
            <input type="number" id="numberOfSeats" class="form-input" placeholder="2–9" min="2" max="9">
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="vin">
            <label for="vin">VIN</label>
            <input type="text" id="vin" class="form-input" placeholder="17-character VIN" maxlength="17">
            <span class="hint">Exactly 17 characters (no I, O, Q)</span>
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="plateNumber">
            <label for="plateNumber">Plate Number</label>
            <input type="text" id="plateNumber" class="form-input" placeholder="e.g. ABC-123-XY">
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="numberOfPreviousOwners">
            <label for="numberOfPreviousOwners">Previous Owners</label>
            <input type="number" id="numberOfPreviousOwners" class="form-input" placeholder="0" min="0" value="0">
            <span class="error"></span>
          </div>

          <div class="form-group" data-field="accidentHistory">
            <label for="accidentHistory">Accident History</label>
            <select id="accidentHistory" class="form-input">
              <option value="unknown">Unknown</option>
              <option value="none">None</option>
              <option value="minor">Minor</option>
              <option value="major">Major</option>
            </select>
            <span class="error"></span>
          </div>

          <div class="form-group">
            <label for="documentationStatus">Documentation Status</label>
            <select id="documentationStatus" class="form-input">
              <option value="registered_valid_papers">Registered with Valid Papers</option>
              <option value="registered_papers_pending">Registered, Papers Pending</option>
              <option value="unregistered">Unregistered</option>
            </select>
          </div>

          <div class="form-group" style="justify-content:flex-end">
            <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer">
              <input type="checkbox" id="serviceHistoryAvailable" style="width:18px;height:18px"> Service History Available
            </label>
          </div>

          <div class="form-group" style="justify-content:flex-end">
            <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer">
              <input type="checkbox" id="hasSpareKey" style="width:18px;height:18px" checked> Has Spare Key
            </label>
          </div>

          <div class="form-group" style="justify-content:flex-end">
            <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer">
              <input type="checkbox" id="warrantyRemaining" style="width:18px;height:18px"> Warranty Remaining
            </label>
          </div>
        </div>

        <div class="form-group full-width" style="margin-top:var(--space-6)">
          <label style="font-size:var(--text-sm);font-weight:600;color:var(--gray-700);margin-bottom:var(--space-2)">Features</label>
          <div class="form-checkbox-group" id="featuresChecklist"></div>
        </div>

        <div class="form-group full-width" style="margin-top:var(--space-6)">
          <label for="images" style="font-size:var(--text-sm);font-weight:600;color:var(--gray-700);margin-bottom:var(--space-2)">Images (max 8)</label>
          <input type="file" id="images" class="form-input" accept="image/jpeg,image/png,image/webp" multiple>
          <span class="hint">JPG, PNG, or WebP. Max 5MB each. Up to 8 images.</span>
          <span class="error" id="imageError"></span>
          <div class="image-preview-grid" id="imagePreviewGrid" style="margin-top:var(--space-3)"></div>
        </div>

        <div style="display:flex;gap:var(--space-3);margin-top:var(--space-6);flex-wrap:wrap">
          <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" style="flex:1;min-width:140px">Save Listing</button>
          <a href="/admin/dashboard.html" class="btn btn-secondary btn-lg" style="flex:1;min-width:100px">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="../js/admin-listing-form.js"></script>
</body>
</html>

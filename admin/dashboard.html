<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Carzaar Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.js"></script>
</head>
<body>
  <header class="admin-header">
    <div class="container">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html"><span>Dashboard</span></a>
        <a href="/admin/listing-form.html" class="btn btn-sm" style="border-color:rgba(255,255,255,0.3);color:white">+ Add Listing</a>
        <button class="btn btn-sm btn-ghost" id="logoutBtn" style="color:rgba(255,255,255,0.85)">Logout</button>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-6);flex-wrap:wrap;gap:var(--space-3)">
        <h1 style="font-size:var(--text-xl);font-weight:700">Listings</h1>
        <a href="/admin/listing-form.html" class="btn btn-primary">+ Add Listing</a>
      </div>

      <div class="admin-table-wrapper">
        <table class="admin-table" id="listingsTable">
          <thead>
            <tr>
              <th>Car</th>
              <th>Price</th>
              <th>Status</th>
              <th>Views</th>
              <th>Clicks</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="listingsTableBody">
            <tr><td colspan="6" style="text-align:center;padding:var(--space-10);color:var(--gray-500)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-dialog-content">
      <h3 id="confirmTitle">Confirm action</h3>
      <p id="confirmMessage">Are you sure?</p>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn btn-destructive" id="confirmProceed">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>

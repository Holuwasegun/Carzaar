<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Carzaar</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.js"></script>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
      <h1>Admin Login</h1>

      <form id="loginForm" novalidate>
        <div class="form-group" data-field="email">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@carzaar.com" required autocomplete="email" autofocus>
          <span class="error"></span>
        </div>

        <div class="form-group" data-field="password">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          <span class="error"></span>
        </div>

        <div class="form-group" data-field="general">
          <span class="error" id="loginError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Sign in</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { login, initAuthGuard } from '../js/admin-auth.js';

    initAuthGuard();

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    function clearErrors() {
      document.querySelectorAll('.form-group.invalid').forEach(el => el.classList.remove('invalid'));
      loginError.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        emailInput.closest('.form-group').classList.add('invalid');
        emailInput.closest('.form-group').querySelector('.error').textContent = 'Email is required';
        return;
      }

      if (!password) {
        passwordInput.closest('.form-group').classList.add('invalid');
        passwordInput.closest('.form-group').querySelector('.error').textContent = 'Password is required';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        await login(email, password);
      } catch (err) {
        loginError.textContent = err.message;
        loginError.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Detail — Carzaar</title>
  <meta name="description" content="View car details on Carzaar">
  <meta property="og:site_name" content="Carzaar">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.js"></script>
</head>
<body>
  <header class="main-header">
    <div class="container">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
      <a href="#" class="sell-link" id="sellCarBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Sell your car
      </a>
    </div>
  </header>

  <main class="container detail-layout" id="detailPage">
    <div class="skeleton-detail" id="skeletonLoader">
      <div class="skeleton skeleton-gallery"></div>
      <div class="skeleton skeleton-block">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line" style="height:32px;width:40%"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line" style="width:60%"></div>
      </div>
      <div class="skeleton skeleton-block">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line" style="width:50%"></div>
      </div>
    </div>

    <div id="listingDetail" style="display:none">
      <div class="detail-gallery">
        <div class="image-gallery" id="gallery">
          <img class="gallery-main" id="galleryMain" src="" alt="Car photo">
          <button class="gallery-nav prev" id="galleryPrev" aria-label="Previous image">&lsaquo;</button>
          <button class="gallery-nav next" id="galleryNext" aria-label="Next image">&rsaquo;</button>
        </div>
        <div class="gallery-thumbs" id="galleryThumbs"></div>
      </div>

      <div class="detail-sidebar">
        <div class="sidebar-card">
          <div class="price-tag" id="detailPrice"></div>
          <div style="margin:var(--space-3) 0 var(--space-4)">
            <span class="condition-badge" id="detailConditionBadge"></span>
            <span class="status-badge" id="detailStatus"></span>
          </div>
          <button class="btn btn-whatsapp btn-lg btn-block" id="whatsappBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Buy on WhatsApp
          </button>
        </div>
      </div>

      <div class="detail-main">
        <h1 class="text-2xl" id="detailTitle" style="font-weight:700;color:var(--color-brand);margin-bottom:var(--space-1)"></h1>
        <p style="font-size:var(--text-sm);color:var(--gray-600);margin-bottom:var(--space-5)" id="detailLocation"></p>

        <div class="detail-section">
          <h2 class="detail-section-title">Overview</h2>
          <div class="specs-grid" id="overviewSpecs"></div>
        </div>

        <div class="detail-section">
          <h2 class="detail-section-title">Description</h2>
          <p style="font-size:var(--text-sm);color:var(--gray-700);line-height:1.7" id="detailDescription"></p>
        </div>

        <div class="detail-section">
          <h2 class="detail-section-title">Specifications</h2>
          <div class="specs-grid" id="specsGrid"></div>
        </div>

        <div class="detail-section">
          <h2 class="detail-section-title">History &amp; Documentation</h2>
          <div class="specs-grid" id="historySpecs"></div>
        </div>

        <div class="detail-section">
          <h2 class="detail-section-title">Features</h2>
          <div class="features-list" id="featuresList"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/listing-detail.js"></script>
  <script type="module" src="../js/sell-car-init.js"></script>
</body>
</html>

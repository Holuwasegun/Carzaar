<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carzaar — Nigerian Car Marketplace</title>
  <meta name="description" content="Browse quality used cars for sale in Nigeria. Find Toyota, Lexus, Honda, and more at competitive prices on Carzaar.">
  <meta property="og:title" content="Carzaar — Nigerian Car Marketplace">
  <meta property="og:description" content="Browse quality used cars for sale in Nigeria.">
  <meta property="og:site_name" content="Carzaar">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/umd/sdk.js"></script>
</head>
<body>
  <header class="main-header">
    <div class="container">
      <a href="/" class="logo" aria-label="Carzaar Home">
        <span class="logo-icon">C</span>
        Carzaar
      </a>
    </div>
  </header>

  <main class="container page-layout">
    <aside class="filter-sidebar" id="filterSidebar" role="complementary" aria-label="Filters">
      <div class="filter-section">
        <h3 class="filter-section-title">Location</h3>
        <div class="form-group">
          <input type="text" class="form-input" id="filterLocation" placeholder="e.g. Lagos, Abuja" autocomplete="off">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Price Range</h3>
        <div class="filter-chips" id="priceChips">
          <button class="filter-chip" data-min="" data-max="3000000">Under ₦3M</button>
          <button class="filter-chip" data-min="3000000" data-max="7000000">₦3M – ₦7M</button>
          <button class="filter-chip" data-min="7000000" data-max="15000000">₦7M – ₦15M</button>
          <button class="filter-chip" data-min="15000000" data-max="">₦15M+</button>
        </div>
        <div class="filter-price-inputs">
          <input type="number" class="form-input" id="filterPriceMin" placeholder="Min" min="0">
          <span>—</span>
          <input type="number" class="form-input" id="filterPriceMax" placeholder="Max" min="0">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Make</h3>
        <div class="checkbox-list" id="makeChecklist"></div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Year Range</h3>
        <div class="filter-price-inputs">
          <input type="number" class="form-input" id="filterYearMin" placeholder="Min" min="1980">
          <span>—</span>
          <input type="number" class="form-input" id="filterYearMax" placeholder="Max" min="1980">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Condition</h3>
        <div class="checkbox-list" id="conditionChecklist"></div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Transmission</h3>
        <div class="checkbox-list" id="transmissionChecklist">
          <label><input type="checkbox" value="automatic"> Automatic <span class="count"></span></label>
          <label><input type="checkbox" value="manual"> Manual <span class="count"></span></label>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Mileage</h3>
        <div class="filter-price-inputs">
          <input type="number" class="form-input" id="filterMileageMin" placeholder="Min km" min="0">
          <span>—</span>
          <input type="number" class="form-input" id="filterMileageMax" placeholder="Max km" min="0">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Body Type</h3>
        <div class="checkbox-list" id="bodyTypeChecklist"></div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Color</h3>
        <div class="checkbox-list" id="colorChecklist"></div>
      </div>

      <div class="filter-section">
        <h3 class="filter-section-title">Fuel</h3>
        <div class="checkbox-list" id="fuelChecklist">
          <label><input type="checkbox" value="petrol"> Petrol <span class="count"></span></label>
          <label><input type="checkbox" value="diesel"> Diesel <span class="count"></span></label>
          <label><input type="checkbox" value="hybrid"> Hybrid <span class="count"></span></label>
          <label><input type="checkbox" value="electric"> Electric <span class="count"></span></label>
        </div>
      </div>
    </aside>

    <section class="results-area" aria-label="Listings">
      <div class="results-toolbar">
        <button class="filters-toggle-btn" id="filtersToggle" type="button" aria-label="Toggle filters">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
          Filters
        </button>
        <span class="results-count" id="resultsCount" aria-live="polite">Loading...</span>
        <select class="sort-select" id="sortSelect" aria-label="Sort listings">
          <option value="newest">Newest first</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>

      <div class="filter-chips" id="quickPriceChips">
        <button class="filter-chip" data-min="" data-max="3000000">Under ₦3M</button>
        <button class="filter-chip" data-min="3000000" data-max="7000000">₦3M – ₦7M</button>
        <button class="filter-chip" data-min="7000000" data-max="15000000">₦7M – ₦15M</button>
        <button class="filter-chip" data-min="15000000" data-max="">₦15M+</button>
      </div>

      <div class="filter-chips" id="quickMakeChips"></div>

      <div class="listings-grid" id="listingsGrid" role="list">
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card" role="presentation" aria-hidden="true">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line" style="height:24px;width:50%"></div>
            <div class="skeleton skeleton-line"></div>
          </div>
        </div>
      </div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </div>
        <h3 class="empty-state-title">No cars match your search</h3>
        <p class="empty-state-text">Try adjusting your filters to find more listings.</p>
        <button class="btn btn-secondary" id="resetFilters">Reset all filters</button>
      </div>

      <div class="load-more-wrapper">
        <button class="btn btn-secondary btn-lg" id="loadMore" style="display:none">Load more cars</button>
      </div>
    </section>
  </main>

  <div class="mobile-filter-overlay" id="mobileFilterOverlay"></div>
  <div class="mobile-filter-panel" id="mobileFilterPanel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <h3>Filters</h3>
      <button class="panel-close" id="mobileFilterClose" aria-label="Close filters">&times;</button>
    </div>
    <div id="mobileFilterContent"></div>
  </div>

  <script type="module" src="js/listings.js"></script>
</body>
</html>
